[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
auto_detect_solc = false
fuzz = { runs = 1024, seed = "0xdeadbeef" }
invariant = { runs = 256, depth = 64, fail_on_revert = true }
bytecode_hash = "none"
cbor_metadata = false

[rpc_endpoints]
base = "${BASE_RPC_URL:-https://mainnet.base.org}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
